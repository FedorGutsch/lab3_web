version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: sn-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: socialdb
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: sn-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy

  backend:
    build: ./backend
    container_name: sn-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/socialdb
      SECRET_KEY: super-secret-key-change-in-prod
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: http://localhost:8000/api
    container_name: sn-frontend
    environment:
      REACT_APP_API_URL: http://localhost:8000/api
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: on-failure

volumes:
  pgdata:
  uploads:
