version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: social_db
    environment:
      POSTGRES_USER: social_user
      POSTGRES_PASSWORD: social_pass_2024
      POSTGRES_DB: social_network
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U social_user -d social_network"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: social_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@social.com
      PGADMIN_DEFAULT_PASSWORD: admin1234
    ports:
      - "5051:80"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  api:
    build:
      context: ./mini-services/api
      dockerfile: Dockerfile
    container_name: social_api
    environment:
      DATABASE_URL: postgresql://social_user:social_pass_2024@db:5432/social_network
      SECRET_KEY: social-secret-key-change-in-production
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: social_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3001:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  pgadmin_data:
